# Supply-chain hardening — https://pnpm.io/supply-chain-security
# (pnpm v11 reads these here, not from .npmrc)

# Cooldown: refuse to install any package version published less than 3 days ago.
# Malicious versions (e.g. Shai-Hulud) are almost always detected and yanked within
# hours, so this filters out smash-and-grab compromises. Raise/lower as you like.
minimumReleaseAge: 4320

# Fail the install if a dependency wants to run an install/build script that is NOT
# explicitly allow-listed in allowBuilds below — instead of silently skipping it.
# New/unexpected build scripts (the Shai-Hulud execution vector) become a hard stop.
strictDepBuilds: true

# Block transitive dependencies that resolve from git repos or tarball URLs.
blockExoticSubdeps: true

# Warn if node_modules doesn't match the lockfile before running a package script.
verifyDepsBeforeRun: warn

# Explicit build-script decisions. Both are intentionally disabled (false): a static
# Next.js export needs neither. sharp = image optimization (we export with unoptimized
# images); unrs-resolver = eslint native resolver (its prebuilt binary works without
# the build step). Set a package to true only after reviewing why it needs to build.
allowBuilds:
  sharp: false
  unrs-resolver: false
